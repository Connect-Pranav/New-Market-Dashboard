<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MARKETO AI™ — Financial Research Operating System</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060A14;--bg2:#0A0F1E;--panel:#0D1326;--panel2:#121A33;
  --blue:#0066FF;--cyan:#00C2FF;--gold:#F5B700;--gold2:#FFD54A;
  --ok:#00D084;--bad:#FF4D5E;--warn:#FFB020;
  --text:#F1F3FA;--text2:#9AA3C2;--muted:#5C6588;
  --bdr:rgba(0,140,255,.14);--bdr2:rgba(245,183,0,.22);--bdrcyan:rgba(0,194,255,.25);
  --fd:'Space Grotesk','Inter',system-ui,sans-serif;--fb:'Inter','Segoe UI',system-ui,sans-serif;
  --radius:14px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased;min-height:100vh}
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(0,102,255,.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(245,183,0,.07), transparent 55%),
    var(--bg);
}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px}

/* ============ TOPBAR ============ */
.topbar{height:60px;background:rgba(6,10,20,.92);backdrop-filter:blur(22px) saturate(140%);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:14px;padding:0 20px;position:sticky;top:0;z-index:500}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:.2px;white-space:nowrap}
.logo .ai{color:var(--gold)}
.logo-mark{width:30px;height:30px;flex-shrink:0}
.tnav{display:flex;align-items:center;gap:2px;margin-left:6px}
.tnav-item{padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px;white-space:nowrap;border:1px solid transparent}
.tnav-item:hover{color:var(--text);background:rgba(0,140,255,.08)}
.tnav-item.active{color:var(--gold);background:rgba(245,183,0,.08);border-color:var(--bdr2)}
.gsearch-wrap{flex:1;max-width:440px;margin:0 auto;position:relative}
.gsearch{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:10px;padding:9px 14px 9px 36px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border-color .2s,background .2s}
.gsearch:focus{border-color:var(--bdrcyan);background:rgba(255,255,255,.07)}
.gsearch::placeholder{color:var(--muted)}
.gsearch-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none}
.gsearch-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--muted);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:5px;border:1px solid var(--bdr)}
.gsearch-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--panel2);border:1px solid var(--bdrcyan);border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,.5);overflow:hidden;display:none;z-index:600}
.gsearch-results.show{display:block}
.gsr-item{padding:11px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.gsr-item:last-child{border-bottom:none}
.gsr-item:hover{background:rgba(0,194,255,.07)}
.gsr-name{font-weight:700;color:var(--text)}
.gsr-meta{font-size:10.5px;color:var(--muted)}
.gsr-tag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:5px;background:rgba(0,194,255,.1);color:var(--cyan)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .18s;font-family:inherit;white-space:nowrap}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1A1100;box-shadow:0 2px 14px rgba(245,183,0,.25)}
.btn-gold:hover{filter:brightness(1.08)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:#0052CC}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--bdr)}
.btn-ghost:hover{background:rgba(0,140,255,.08);color:var(--text);border-color:var(--bdrcyan)}
.btn-sm{padding:6px 12px;font-size:11.5px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ============ LAYOUT ============ */
.main{max-width:1500px;margin:0 auto;padding:20px 22px 60px;width:100%}
.page{display:none}
.page.active{display:block;animation:fadein .35s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pg-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap}
.pg-title{font-family:var(--fd);font-size:23px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px}
.pg-sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.pg-eyebrow{font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;display:block}
.disclaimer-strip{font-size:10.5px;color:var(--muted);background:rgba(245,183,0,.05);border:1px solid rgba(245,183,0,.15);border-radius:8px;padding:7px 12px;margin-bottom:18px;display:flex;align-items:center;gap:7px}
.disclaimer-strip b{color:var(--gold);font-weight:700}
.card{background:var(--panel);border:1px solid var(--bdr);border-radius:var(--radius);padding:18px;transition:border-color .2s;position:relative}
.card:hover{border-color:var(--bdrcyan)}
.card-title{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--text);margin-bottom:13px;display:flex;align-items:center;gap:7px;justify-content:space-between}
.card-title-l{display:flex;align-items:center;gap:7px}
.grid{display:grid;gap:16px}
.g6{grid-template-columns:repeat(6,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.gExecLayout{grid-template-columns:1fr 360px}
.span2{grid-column:span 2}
.span3{grid-column:span 3}
@media(max-width:1200px){.gExecLayout{grid-template-columns:1fr}.g6{grid-template-columns:repeat(3,1fr)}.g5{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.g6,.g5,.g4,.g3,.g2{grid-template-columns:repeat(2,1fr)}.tnav{display:none}}

/* ============ EXEC DASHBOARD ============ */
.stat-card{background:var(--panel);border:1px solid var(--bdr);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.stat-v{font-size:clamp(15px,2.2vw,20px);font-weight:800;font-family:var(--fd);margin-bottom:4px}
.stat-c{font-size:11.5px;font-weight:600}
.score-ring{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.score-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.score-ring-val{font-family:var(--fd);font-weight:800;font-size:17px;z-index:1}
.sector-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.sector-row:last-child{border-bottom:none}
.opp-card{background:rgba(255,255,255,.02);border:1px solid var(--bdr);border-radius:10px;padding:11px;cursor:pointer;transition:all .18s}
.opp-card:hover{border-color:var(--bdrcyan);background:rgba(0,194,255,.04)}
.opp-name{font-weight:700;font-size:12.5px;color:var(--text)}
.opp-tag{font-size:10px;color:var(--muted);margin-top:2px}
.opp-score{font-size:10px;font-weight:700;color:var(--gold);margin-top:6px}

/* ============ TV PANEL ============ */
.tv-panel{position:sticky;top:76px;display:flex;flex-direction:column;gap:14px}
.tv-card{background:var(--panel);border:1px solid var(--bdr2);border-radius:14px;overflow:hidden}
.tv-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bdr)}
.tv-head-title{font-family:var(--fd);font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--bad);box-shadow:0 0 8px var(--bad);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tv-tabs{display:flex;gap:4px;padding:8px 10px;overflow-x:auto;border-bottom:1px solid var(--bdr)}
.tv-tab{padding:6px 10px;font-size:10.5px;font-weight:700;border-radius:7px;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;border:1px solid transparent}
.tv-tab:hover{background:rgba(255,255,255,.04)}
.tv-tab.active{background:rgba(245,183,0,.1);color:var(--gold);border-color:var(--bdr2)}
.tv-player{aspect-ratio:16/10;background:linear-gradient(145deg,#0A1024,#060A14);position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.tv-player-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,102,255,.12),rgba(245,183,0,.08));opacity:.7}
.tv-player-content{position:relative;z-index:2;text-align:center;padding:16px;animation:tvfade .4s ease}
@keyframes tvfade{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.tv-chan-logo{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:15px;margin:0 auto 10px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.tv-chan-name{font-family:var(--fd);font-weight:700;font-size:13px;color:var(--text)}
.tv-chan-sub{font-size:10.5px;color:var(--muted);margin-top:3px}
.tv-live-badge{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;background:rgba(255,77,94,.15);border:1px solid rgba(255,77,94,.4);padding:4px 9px;border-radius:6px;font-size:9.5px;font-weight:800;color:var(--bad);z-index:3}
.tv-controls{position:absolute;bottom:10px;left:10px;right:10px;display:flex;align-items:center;gap:8px;z-index:3}
.tv-ctrl-btn{width:26px;height:26px;border-radius:7px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2)}
.tv-ticker{background:rgba(0,0,0,.35);padding:8px 12px;font-size:10.5px;color:var(--text2);border-top:1px solid rgba(255,255,255,.06)}
.tv-news-list{padding:10px 12px;display:flex;flex-direction:column;gap:9px;max-height:220px;overflow-y:auto}
.tv-news-item{display:flex;gap:8px;font-size:11px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.04)}
.tv-news-item:last-child{border-bottom:none;padding-bottom:0}
.tv-news-dot{width:5px;height:5px;border-radius:50%;background:var(--cyan);margin-top:5px;flex-shrink:0}
.tv-news-t{color:var(--text2);line-height:1.4}
.tv-news-time{font-size:9.5px;color:var(--muted);margin-top:2px}

/* ============ MASCOT ============ */
.mascot-dock{position:fixed;bottom:22px;right:22px;z-index:400;display:flex;align-items:flex-end;gap:10px}
.mascot-bubble{background:var(--panel2);border:1px solid var(--bdrcyan);border-radius:14px;padding:10px 14px;font-size:12px;color:var(--text);max-width:220px;box-shadow:0 10px 30px rgba(0,0,0,.4);display:none;margin-bottom:8px}
.mascot-bubble.show{display:block;animation:fadein .3s ease}
.mascot-wrap{width:64px;height:64px;cursor:pointer;position:relative}
.mascot-wrap svg{width:100%;height:100%;filter:drop-shadow(0 4px 16px rgba(245,183,0,.35))}
.mascot-state-label{position:absolute;top:-6px;right:-6px;background:var(--ok);color:#06140C;font-size:8px;font-weight:800;padding:2px 5px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px}

/* ============ RESEARCH DASHBOARD ============ */
.rsch-header{background:var(--panel);border:1px solid var(--bdrcyan);border-radius:16px;padding:20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.rsch-logo{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:18px;flex-shrink:0}
.rsch-name{font-family:var(--fd);font-size:19px;font-weight:700}
.rsch-sector{font-size:11.5px;color:var(--muted);margin-top:2px}
.rsch-stats{display:flex;gap:22px;margin-left:auto;flex-wrap:wrap}
.rsch-stat-l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.rsch-stat-v{font-size:15px;font-weight:800;font-family:var(--fd);margin-top:2px}
.rsch-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;border-bottom:1px solid var(--bdr);padding-bottom:0}
.rsch-tab{padding:9px 16px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.rsch-tab:hover{color:var(--text)}
.rsch-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.rsch-pane{display:none}
.rsch-pane.active{display:block;animation:fadein .3s ease}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.score-box{background:var(--panel);border:1px solid var(--bdr);border-radius:12px;padding:14px;text-align:center}
.score-box-label{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.score-box-val{font-size:26px;font-weight:800;font-family:var(--fd)}
.score-bar-track{height:5px;border-radius:3px;background:rgba(255,255,255,.06);margin-top:8px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px}
@media(max-width:900px){.score-grid{grid-template-columns:repeat(2,1fr)}}
.bullet-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.bullet-list li{font-size:12.5px;color:var(--text2);line-height:1.55;padding-left:16px;position:relative}
.bullet-list li::before{content:'';position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%}
.bl-s li::before{background:var(--ok)}
.bl-w li::before{background:var(--warn)}
.bl-o li::before{background:var(--cyan)}
.bl-t li::before{background:var(--bad)}
.swot-box{border-radius:12px;padding:16px;border:1px solid var(--bdr)}
.swot-head{font-family:var(--fd);font-size:12px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.fin-tbl{width:100%;border-collapse:collapse}
.fin-tbl th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:9px 12px;text-align:left;border-bottom:1px solid var(--bdr);background:var(--panel2)}
.fin-tbl td{padding:9px 12px;font-size:12.5px;border-bottom:1px solid rgba(255,255,255,.04)}
.fin-tbl tr:last-child td{border-bottom:none}
.bcg-matrix{position:relative;width:100%;aspect-ratio:1.3/1;background:var(--panel2);border-radius:12px;border:1px solid var(--bdr);overflow:hidden}
.bcg-quad{position:absolute;width:50%;height:50%;display:flex;align-items:flex-start;justify-content:flex-start;padding:10px;font-size:10px;font-weight:700;color:var(--muted)}
.bcg-dot{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 6px rgba(245,183,0,.18);transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#1A1100}
.ceo-card{display:flex;gap:14px;align-items:flex-start}
.ceo-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:16px;flex-shrink:0}
.tech-mini-chart{height:90px;background:rgba(0,194,255,.04);border:1px dashed var(--bdrcyan);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);margin-bottom:12px}
.ind-row{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ind-row:last-child{border-bottom:none}
.tf-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tf-tab{padding:5px 10px;font-size:10.5px;font-weight:700;border-radius:6px;background:rgba(255,255,255,.04);color:var(--text2);cursor:pointer;border:1px solid transparent}
.tf-tab.active{background:rgba(0,194,255,.1);color:var(--cyan);border-color:var(--bdrcyan)}

/* ============ OPPORTUNITY DASHBOARD ============ */
.screen-layout{display:grid;grid-template-columns:270px 1fr;gap:16px;align-items:start}
.filter-panel{background:var(--panel);border:1px solid var(--bdr);border-radius:14px;padding:16px;position:sticky;top:76px}
.fp-title{font-family:var(--fd);font-size:12.5px;font-weight:700;margin-bottom:13px}
.fgroup{margin-bottom:15px}
.flabel{font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px}
.frow{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.frow label{font-size:10.5px;color:var(--muted);width:46px;flex-shrink:0}
.finput{background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:6px;padding:6px 9px;color:var(--text);font-size:11.5px;outline:none;width:100%;font-family:inherit}
.finput:focus{border-color:var(--bdrcyan)}
.preset{padding:7px 11px;border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--text2);transition:all .2s;text-align:left;width:100%;margin-bottom:6px;display:block}
.preset:hover{border-color:var(--bdrcyan);color:var(--text);background:rgba(0,140,255,.06)}
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--bdr);background:var(--panel2);white-space:nowrap;cursor:pointer}
.stbl td{padding:8px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.stbl tr:hover td{background:rgba(0,140,255,.03)}
.score-chip{display:inline-flex;align-items:center;justify-content:center;min-width:32px;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:800}
.tbl-wrap{background:var(--panel);border:1px solid var(--bdr);border-radius:14px;overflow:hidden}
.opp-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.opp-tab-btn{padding:8px 14px;border-radius:9px;font-size:12px;font-weight:700;background:rgba(255,255,255,.03);border:1px solid var(--bdr);color:var(--text2);cursor:pointer}
.opp-tab-btn.active{background:rgba(245,183,0,.08);color:var(--gold);border-color:var(--bdr2)}

/* ============ BRAIN ============ */
.brain-layout{display:grid;grid-template-columns:280px 1fr;gap:16px}
.brain-side{display:flex;flex-direction:column;gap:14px}
.brain-cap-list{display:flex;flex-direction:column;gap:8px}
.brain-cap-item{font-size:11.5px;color:var(--text2);padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid var(--bdr);display:flex;gap:7px;align-items:center}
.chat-window{background:var(--panel);border:1px solid var(--bdr);border-radius:14px;display:flex;flex-direction:column;height:560px}
.chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.chat-msg{max-width:78%;font-size:13px;line-height:1.6;padding:11px 14px;border-radius:12px}
.chat-msg.user{align-self:flex-end;background:var(--blue);color:#fff}
.chat-msg.ai{align-self:flex-start;background:var(--panel2);border:1px solid var(--bdr);color:var(--text2)}
.chat-msg.ai b{color:var(--text)}
.chat-input-row{display:flex;gap:8px;padding:14px;border-top:1px solid var(--bdr)}
.chat-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.chat-input:focus{border-color:var(--bdrcyan)}
.chat-suggest{display:flex;gap:7px;flex-wrap:wrap;padding:0 14px 12px}

    </ellipse>

      ${state==='sleep' ?
        `<line x1="24" y1="${eyeY}" x2="29" y2="${eyeY}" stroke="#08111F" stroke-width="2" stroke-linecap="round"/>
         <line x1="35" y1="${eyeY}" x2="40" y2="${eyeY}" stroke="#08111F" stroke-width="2" stroke-linecap="round"/>`
        :
        `<circle cx="26" cy="${eyeY}" r="3" fill="#08111F"/><circle cx="38" cy="${eyeY}" r="3" fill="#08111F"/>
         <circle cx="27" cy="${eyeY-1}" r="1" fill="#00E5FF"/><circle cx="39" cy="${eyeY-1}" r="1" fill="#00E5FF"/>`
      }
      ${state==='speaking'||state==='celebration' ? `<ellipse cx="32" cy="38" rx="5" ry="3" fill="#08111F" opacity="0.7"/>` : `<path d="M27 38 q5 4 10 0" stroke="#08111F" stroke-width="2" fill="none" stroke-linecap="round"/>`}

    <path d="M10 36 q-6 -2 -8 -10 q6 0 9 6z" fill="#00C2FF" opacity="0.55"/>
    <path d="M54 36 q6 -2 8 -10 q-6 0 -9 6z" fill="#00C2FF" opacity="0.55"/>
  </svg>`;
}
function renderMascot(){
  document.getElementById('mascotWrap').innerHTML = mascotSVG(mascotState);
}
function setMascotState(state,customMsg){
  mascotState=state;
  renderMascot();
  const bubble=document.getElementById('mascotBubble');
  bubble.textContent = customMsg || MASCOT_STATES[state].msg;
  bubble.classList.add('show');
  clearTimeout(window._mascotTimer);
  window._mascotTimer=setTimeout(()=>bubble.classList.remove('show'), 3600);
}
function mascotClick(){
  mascotClickCount++;
  if(mascotState==='sleep'){ setMascotState('idle'); return; }
  const cycle=['thinking','researching','analyzing','speaking'];
  setMascotState(cycle[mascotClickCount%cycle.length]);
  if(mascotClickCount%7===0) setMascotState('celebration',"You've explored a lot of research today!");
}
let idleTimer;
function resetIdleTimer(){
  clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>setMascotState('sleep'), 45000);
}

function goPage(p){
  document.querySelectorAll('.tnav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===p));
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  let el=document.getElementById('page-'+p);
  if(!el){ renderPage(p); el=document.getElementById('page-'+p); }
  el.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderPage(p){
  const main=document.getElementById('appMain');
  const div=document.createElement('div');
  div.className='page'; div.id='page-'+p;
  if(p==='exec') div.innerHTML=execPageHTML();
  if(p==='research') div.innerHTML=researchPageHTML();
  if(p==='opportunity') div.innerHTML=opportunityPageHTML();
  if(p==='brain') div.innerHTML=brainPageHTML();
  if(p==='news') div.innerHTML=newsPageHTML();
  main.appendChild(div);
  if(p==='research'){ renderResearch(currentTicker); initTVPanel(); }
  if(p==='opportunity'){ renderScreener(screenerResults); renderOppGroups(); }
  if(p==='brain'){ scrollChatBottom(); }
  if(p==='news'){ renderNewsFeed(); }
}

function scoreColor(v){ return v>=75?'var(--ok)':v>=50?'var(--warn)':'var(--bad)'; }
function ringSVG(val,color,size=64,stroke=6){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-val/100);
  return `<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="${stroke}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>`;
}

function renderOppGroups(){

  root.innerHTML=`

    <div id="oppGroupBody"></div>`;
  showOppGroup(tabs[0]);
}
function showOppGroup(k){
  document.querySelectorAll('#oppTabs .opp-tab-btn').forEach(el=>el.classList.toggle('active',el.dataset.k===k));
  const g=OPPORTUNITY_GROUPS[k];
  const body=document.getElementById('oppGroupBody');
  body.innerHTML=`<div class="card"><div style="font-size:11.5px;color:var(--muted);margin-bottom:12px">${g.note}</div>
    <div class="grid g5">
    ${g.tickers.map(t=>{
      const c=SCREENER_UNIVERSE.find(x=>x.n===t)||{};
      return `<div class="opp-card" onclick="searchTicker('${t}')"><div class="opp-name">${t}</div><div class="opp-tag">${c.s||''}</div><div class="opp-score">Quality ${c.quality||'—'}</div></div>`;
    }).join('')}
    </div></div>`;
}
function renderScreener(rows){
  document.getElementById('rCount').textContent=rows.length+' companies found';
  document.getElementById('screenBody').innerHTML=rows.map(s=>`<tr>
    <td style="font-weight:700;cursor:pointer;color:var(--cyan)" onclick="searchTicker('${s.n}')">${s.n}<div style="font-size:9.5px;color:var(--muted);font-weight:400">${s.s}</div></td>
    <td>${s.pe}x</td>
    <td style="color:${s.roe>=20?'var(--ok)':'var(--text)'}">${s.roe}%</td>
    <td style="color:${s.revG>=15?'var(--ok)':'var(--text)'}">${s.revG}%</td>
    <td>${s.divY}%</td>
    <td><span class="score-chip" style="background:rgba(0,208,132,.1);color:${scoreColor(s.quality)}">${s.quality}</span></td>
    <td><span class="score-chip" style="background:rgba(0,208,132,.1);color:${scoreColor(s.growth)}">${s.growth}</span></td>
    <td><span class="score-chip" style="background:rgba(0,208,132,.1);color:${scoreColor(s.health)}">${s.health}</span></td>
    <td><span class="score-chip" style="background:rgba(255,77,94,.08);color:${s.risk<=30?'var(--ok)':s.risk<=45?'var(--warn)':'var(--bad)'}">${s.risk}</span></td>
  </tr>`).join('');
}
function runScreen(){
  const v=id=>parseFloat(document.getElementById(id).value);
  const maxPE=v('maxPE')||999, minROE=v('minROE')||0, minROCE=v('minROCE')||0, minRevG=v('minRevG')||0, minDivY=v('minDivY')||0;
  const minProm=v('minProm')||0, minFII=v('minFII')||0, minQuality=v('minQuality')||0, minGrowth=v('minGrowth')||0, minHealth=v('minHealth')||0;
  screenerResults=SCREENER_UNIVERSE.filter(s=>s.pe<=maxPE&&s.roe>=minROE&&s.roce>=minROCE&&s.revG>=minRevG&&s.divY>=minDivY&&(s.promHold||0)>=minProm&&s.fiiHold>=minFII&&s.quality>=minQuality&&s.growth>=minGrowth&&s.health>=minHealth);
  renderScreener(screenerResults);
  setMascotState('analyzing',`${screenerResults.length} companies match your filters.`);
}
function clearFilters(){
  ['maxPE','minROE','minROCE','minRevG','minDivY','minProm','minFII','minQuality','minGrowth','minHealth'].forEach(id=>document.getElementById(id).value='');
  screenerResults=[...SCREENER_UNIVERSE]; renderScreener(screenerResults);
}
const PRESETS={
  quality:{minQuality:78},
  growth:{minGrowth:70},
  value:{maxPE:22},
  dividend:{minDivY:1.0},
  lowrisk:{minHealth:75}
};
function loadPreset(p){
  clearFilters();
  const pr=PRESETS[p];
  Object.keys(pr).forEach(k=>document.getElementById(k).value=pr[k]);
  runScreen();
}
function sortTable(key){
  if(sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=1; }
  screenerResults.sort((a,b)=>{
    if(typeof a[key]==='string') return a[key].localeCompare(b[key])*sortDir;
    return (a[key]-b[key])*sortDir;
  });
  renderScreener(screenerResults);
}

function renderChat(){

  scrollChatBottom();
}
function scrollChatBottom(){
  const el=document.getElementById('chatMsgs');
  if(el) el.scrollTop=el.scrollHeight;
}
function sendChip(text){ document.getElementById('chatInput').value=text; sendChat(); }
function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text) return;
  chatHistory.push({role:'user',text});
  renderChat();
  input.value='';
  setMascotState('thinking');
  setTimeout(()=>{
    chatHistory.push({role:'ai',text:brainRespond(text)});
    renderChat();
    setMascotState('speaking');
  },650);
}
function brainRespond(q){
  const upper=q.toUpperCase();
  const found=Object.keys(COMPANIES).find(t=>upper.includes(t));
  if(found){
    const d=COMPANIES[found];
    return `<b>${d.name} — Research Summary</b><br><br>
    <b>Overview:</b> ${d.overview.business}<br><br>
    <b>Financial Trend:</b> Revenue and profit have shown a steady multi-quarter trajectory; ROE stands at ${d.financials.ratios.roe} with ${d.financials.ratios.debt.toLowerCase()}.<br><br>
    <b>Management:</b> ${d.management.vision}<br><br>
    <b>SWOT Snapshot:</b> Key strength — ${d.swot.s[0]}. Key risk — ${d.swot.t[0]}.<br><br>
    <b>Research Scores:</b> Quality ${d.scores.quality} · Growth ${d.scores.growth} · Health ${d.scores.health} · Management ${d.scores.management} · Risk ${d.scores.risk}<br><br>
    <i>This is a research summary based on illustrative data, not investment advice. View the full workspace in the Research Dashboard.</i> <span style="color:var(--cyan);cursor:pointer" onclick="goPage('research');searchTicker('${found}')">Open ${found} →</span>`;
  }
  if(upper.includes('COMPARE')){
    const tickers=Object.keys(COMPANIES).filter(t=>upper.includes(t));
    if(tickers.length>=2){
      const [a,b]=tickers;
      const da=COMPANIES[a], db=COMPANIES[b];
      return `<b>${a} vs ${b} — Research Comparison</b><br><br>
      <table style="width:100%;font-size:12px;border-collapse:collapse">
      <tr><td style="padding:4px 0;color:var(--muted)">Quality</td><td>${da.scores.quality}</td><td>${db.scores.quality}</td></tr>
      <tr><td style="padding:4px 0;color:var(--muted)">Growth</td><td>${da.scores.growth}</td><td>${db.scores.growth}</td></tr>
      <tr><td style="padding:4px 0;color:var(--muted)">Health</td><td>${da.scores.health}</td><td>${db.scores.health}</td></tr>
      <tr><td style="padding:4px 0;color:var(--muted)">Risk</td><td>${da.scores.risk}</td><td>${db.scores.risk}</td></tr>
      </table><br><i>Comparison reflects research scores only, not a recommendation to prefer one over the other.</i>`;
    }
  }
  if(upper.includes('BCG')){
    return `<b>BCG Matrix — Quick Explainer</b><br><br>The BCG Matrix classifies a business along two axes: relative market share (x-axis) and market growth rate (y-axis), producing four quadrants — <b>Stars</b> (high share, high growth), <b>Cash Cows</b> (high share, low growth), <b>Question Marks</b> (low share, high growth), and <b>Dogs</b> (low share, low growth). Each covered company in MARKETO AI has a BCG positioning available in its Research Dashboard tab.`;
  }
  if(upper.includes('RISK')){
    return `MARKETO Brain™ evaluates risk across five dimensions for any covered company: promoter risk, debt risk, competition risk, sector risk, and execution risk. Try asking <i>"Explain [TICKER] risk profile"</i> with a specific company name, e.g. SBILIFE, TCS, RELIANCE, INDIAMART, or HDFCBANK.`;
  }
  return `I can help research INDIAMART, RELIANCE, TCS, HDFCBANK, or SBILIFE — try asking me to "Analyze [company]", "Compare [A] vs [B]", or ask about a research concept like SWOT or BCG Matrix.`;
}

function renderNewsFeed(){
  const root=document.getElementById('newsFeedRoot');
  if(!root) return;
  const catColor={Breaking:'var(--bad)',Results:'var(--ok)','FII/DII':'var(--cyan)','Corporate Actions':'var(--gold)',Sector:'var(--cyan)','Government Policy':'var(--warn)','Bulk Deals':'var(--muted)'};
  const sentClass={Positive:'sent-pos',Negative:'sent-neg',Neutral:'sent-neu'};
  root.innerHTML=NEWS_FEED.map(n=>`<div class="news-item">
    <span class="news-cat" style="background:${catColor[n.cat]}1A;color:${catColor[n.cat]}">${n.cat}</span>
    <div class="news-body">
      <div class="news-title">${n.t}</div>
      <div class="news-meta"><span>${n.time}</span><span>Impact: ${n.impact}</span><span class="${sentClass[n.sentiment]}">${n.sentiment}</span></div>
    </div>
  </div>`).join('');
}

/* =====================================================================
   GLOBAL SEARCH
===================================================================== */
const SEARCHABLE=[
  ...Object.values(COMPANIES).map(c=>({type:'Company',label:c.ticker,meta:c.name,action:()=>searchTicker(c.ticker)})),
  ...SCREENER_UNIVERSE.filter(s=>!COMPANIES[s.n]).map(s=>({type:'Company',label:s.n,meta:s.s,action:()=>{
    // Generic fallback for screener-only tickers without full research data
    goPage('opportunity');
  }})),
  {type:'Sector',label:'IT Services',meta:'TCS, WIPRO, ZENTEC',action:()=>goPage('opportunity')},
  {type:'Sector',label:'Insurance',meta:'SBILIFE, HDFCLIFE, ICICIGI',action:()=>goPage('opportunity')},
  {type:'Sector',label:'Banking',meta:'HDFCBANK',action:()=>goPage('opportunity')},
  {type:'Theme',label:'Defence Stocks',meta:'Thematic screen',action:()=>goPage('opportunity')},
  {type:'Theme',label:'EV Sector',meta:'Thematic screen',action:()=>goPage('opportunity')},
  {type:'CEO',label:'Dinesh Agarwal',meta:'CEO, IndiaMART',action:()=>searchTicker('INDIAMART')},
  {type:'CEO',label:'Mukesh Ambani',meta:'Chairman, Reliance Industries',action:()=>searchTicker('RELIANCE')},
  {type:'CEO',label:'K Krithivasan',meta:'CEO, TCS',action:()=>searchTicker('TCS')}
];
const searchInput=document.getElementById('globalSearch');
const searchResultsEl=document.getElementById('gsearchResults');
searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim().toLowerCase();
  if(!q){ searchResultsEl.classList.remove('show'); return; }
  const matches=SEARCHABLE.filter(s=>s.label.toLowerCase().includes(q)||s.meta.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){ searchResultsEl.innerHTML=`<div class="gsr-item"><span class="gsr-meta">No matches in covered universe</span></div>`; searchResultsEl.classList.add('show'); return; }
  searchResultsEl.innerHTML=matches.map((m,i)=>`<div class="gsr-item" data-i="${i}"><div><div class="gsr-name">${m.label}</div><div class="gsr-meta">${m.meta}</div></div><span class="gsr-tag">${m.type}</span></div>`).join('');
  searchResultsEl.classList.add('show');
  Array.from(searchResultsEl.children).forEach((el,i)=>el.addEventListener('click',()=>{ matches[i].action(); searchResultsEl.classList.remove('show'); searchInput.value=''; }));
});
document.addEventListener('click',e=>{ if(!e.target.closest('.gsearch-wrap')) searchResultsEl.classList.remove('show'); });
document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='k'){ e.preventDefault(); searchInput.focus(); } });

/* =====================================================================
   INIT
===================================================================== */
renderMascot();
resetIdleTimer();
goPage('exec');
</script>
